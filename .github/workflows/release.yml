name: release

# Publishes every public Oh My Docs package to npm when a version tag is pushed.
# The tag is the trigger AND the version: `git tag v0.1.0 && git push --tags`.
#
# Auth uses npm Trusted Publishing (OIDC). Configure each public package on
# npmjs.com → Trusted Publisher → GitHub Actions with:
#   repository: ssota-labs/oh-my-docs (or the current GitHub remote name)
#   workflow filename: release.yml
# No long-lived NPM_TOKEN is required once Trusted Publishing is set up.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  id-token: write # npm Trusted Publishing / provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.5.2

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # The tag must match every public package.json and plugin manifest version.
      # A mismatch would publish the wrong version — fail before build/publish.
      - name: Verify tag matches package versions
        run: node scripts/check-release-version.mjs "${{ github.ref_name }}"

      - run: pnpm --filter create-oh-my-docs... run build
      - run: pnpm test
      - run: pnpm typecheck

      - name: Pack smoke (tarball install)
        run: pnpm check:pack-smoke

      # Topological order, workspace:* rewritten to the real version, and versions
      # already on the registry skipped — all handled by pnpm. Trusted Publishing
      # authenticates via OIDC; --provenance records a signed link to this run;
      # --no-git-checks because the tag is already the checked-out ref.
      - name: Publish public packages
        run: pnpm --filter "./packages/*" publish --access public --no-git-checks --provenance
        env:
          NPM_CONFIG_PROVENANCE: 'true'
