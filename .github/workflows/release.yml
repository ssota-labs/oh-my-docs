name: release

# Validates a version tag for the Oh My Docs skill + plugin manifests.
# npm publish is intentionally not part of this release surface.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.5.2

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Verify tag matches skill and plugin versions
        run: node scripts/check-release-version.mjs "${{ github.ref_name }}"

      - run: pnpm check:ui-snapshot
      - run: pnpm check:skills
      - run: pnpm test
      - run: pnpm typecheck
      - run: pnpm build
