name: validate

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  repository:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.5.2
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm check:planning
      - run: pnpm test
      - run: pnpm typecheck
      - run: pnpm build
